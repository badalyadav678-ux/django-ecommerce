{% extends 'base.html' %}

{% block content %}

<h2 style="margin-bottom:20px;">Checkout</h2>

<div style="display:flex; gap:30px; flex-wrap:wrap;">

    <!-- LEFT: FORM -->
    <div style="flex:2; background:white; padding:20px;
                border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.05);">

        <form method="POST">
            {% csrf_token %}

            <label>Name</label><br>
            <input type="text" name="name" required
                   style="width:100%; padding:10px; margin-bottom:15px;"><br>

            <label>Phone</label><br>
            <input type="text" name="phone" required
                   style="width:100%; padding:10px; margin-bottom:15px;"><br>

            <label>Address</label><br>
            <textarea name="address" required
                      style="width:100%; padding:10px; margin-bottom:20px;"></textarea><br>

            <button type="submit"
                    style="background:green; color:white; padding:12px 20px;">
                Place Order
            </button>

        </form>

    </div>

    <!-- RIGHT: SUMMARY -->
    <div style="flex:1; background:white; padding:20px;
                border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.05); height:fit-content;">

        <h3>Order Summary</h3>
        <hr>

        {% for item in products %}
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>{{ item.product.name }} × {{ item.quantity }}</span>
                <span>₹ {{ item.product.price|floatformat:2 }}</span>
            </div>
        {% endfor %}

        <hr>

        <h3 style="color:#b12704;">Total: ₹ {{ total }}</h3>

    </div>

</div>

{% endblock %}
