{% extends 'base.html' %}

{% block content %}

<h2 style="text-align:center;">Our Products</h2>

{% if products|length > 0 %}

<div style="display:flex; flex-wrap:wrap; justify-content:center;">

    {% for product in products %}

    <div style="border:1px solid #ddd; margin:15px; padding:15px; width:220px; border-radius:10px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.1);">

        {% if product.image %}
            <img src="{{ product.image.url }}" width="150" style="margin-bottom:10px;">
        {% endif %}

        <a href="{% url 'product_detail' product.id %}" style="text-decoration:none; color:black;">
            <h3>{{ product.name }}</h3>
        </a>

        <p style="color:green; font-weight:bold;">₹ {{ product.price }}</p>

        <a href="{% url 'add_to_cart' product.id %}">
            <button style="background:orange; border:none; padding:8px 15px; border-radius:5px;">
                Add to Cart
            </button>
        </a>

    </div>

    {% endfor %}

</div>

{% else %}

<p style="text-align:center; font-size:20px; color:red; margin-top:20px;">
    No products found
</p>

{% endif %}

{% endblock %}
