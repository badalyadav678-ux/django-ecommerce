{% extends 'base.html' %}

{% block content %}

<h2 style="text-align:center;">Our Products</h2>

{% if products|length > 0 %}

<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:20px; padding:20px;">

    {% for product in products %}
    <div style="border:1px solid #ddd; padding:15px; border-radius:10px; text-align:center;
                box-shadow:0 2px 8px rgba(0,0,0,0.1);
                transition:0.3s;"
         onmouseover="this.style.transform='scale(1.05)'"
         onmouseout="this.style.transform='scale(1)'">

        <!-- Product Image -->
        <img src="{{ product.image.url }}" width="180" height="180" style="object-fit:cover;">

        <!-- Name -->
        <h3 style="margin:10px 0;">{{ product.name }}</h3>

        <!-- Price -->
        <p style="font-weight:bold; color:#b12704;">₹ {{ product.price }}</p>

        <!-- Buttons -->
        <div style="display:flex; justify-content:center; gap:10px; margin-top:10px;">

            <a href="{% url 'product_detail' product.id %}">
                <button style="background:#ffd814;">View</button>
            </a>

            <a href="{% url 'add_to_cart' product.id %}">
                <button style="background:#ffa41c;">Add</button>
            </a>

        </div>

    </div>
    {% endfor %}

</div>

{% else %}

<p style="text-align:center; font-size:20px; color:red; margin-top:20px;">
    No products found
</p>

{% endif %}

{% if products %}
    <!-- your product loop -->
{% else %}
    <h2 style="text-align:center; padding:20px;">
        ❌ No products found
    </h2>
{% endif %}

{% endblock %}
